// ── Tooltip ───────────────────────────────────────────────────────────────────
function makeTip(unit){
  return function T(p){
    if(!p.active||!p.payload||!p.payload.length) return null;
    return h('div',{style:{background:WHITE,border:'1px solid '+BRDR,borderRadius:6,
      padding:'8px 12px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,0.12)'}},
      h('div',{style:{color:LIGHT,fontSize:10,marginBottom:4,fontWeight:500}},p.label),
      p.payload.map(function(pt,i){
        if(pt.value==null) return null;
        var name=pt.name&&pt.name!=='v'?pt.name+': ':'';
        var val=typeof pt.value==='number'?pt.value.toFixed(2):pt.value;
        return h('div',{key:i,style:{color:pt.color||NAVY,
          fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:11}},
          name+val+(unit||''));
      })
    );
  };
}

function DiarreiaSection(props){
  var D=props.D;
  var dd=D.diarreia||{};

  var DUNITS=[
    {key:'utiab',label:'UTI A/B',    color:RED},
    {key:'utic', label:'UTI C',      color:PURPLE},
    {key:'cm',   label:'Cl. Médica', color:BLUE},
    {key:'cc',   label:'Cl. Cirúrgica',color:GREEN},
    {key:'epm',  label:'EPM / Apto', color:AMBER},
  ];

  // Build timeline from the cm series (longest/most complete)
  var ref=dd.cm||[];
  if(!ref.length) return h('div',{className:'fi'},h('div',{style:{color:MUTED,padding:24,fontSize:12}},'Sem dados de diarreia disponíveis.'));

  var lastLbl=(ref[ref.length-1]||{}).p||'';
  var currYr=(lastLbl.split('/')[1])||'';

  var allLabels=ref.map(function(pt){return pt.p;});

  var chartData=allLabels.map(function(lbl){
    var ptYr=(lbl.split('/')[1])||'';
    var prev=ptYr!==currYr;
    var row={m:lbl,prev:prev};
    DUNITS.forEach(function(u){
      var series=dd[u.key]||[];
      var pt=series.find(function(s){return s.p===lbl;})||{};
      var v=pt.v!=null?pt.v:null;
      row[u.key]=v;
      row[u.key+'_prev']=prev?v:null;
      row[u.key+'_curr']=!prev?v:null;
      // Share boundary point so lines connect across year boundary
      var prevPt=allLabels.indexOf(lbl)>0&&allLabels[allLabels.indexOf(lbl)-1];
      if(!prev&&prevPt&&(prevPt.split('/')[1])!==currYr) row[u.key+'_prev']=v;
    });
    return row;
  });

  var pvFirst=null,pvLast=null;
  chartData.forEach(function(d){if(d.prev){if(!pvFirst)pvFirst=d.m;pvLast=d.m;}});

  // KPI strip — latest value per unit
  var kpis=DUNITS.map(function(u){
    var series=dd[u.key]||[];
    var curr=null,currLbl='—';
    for(var i=series.length-1;i>=0;i--){
      if(series[i].v!=null){curr=series[i].v;currLbl=series[i].p;break;}
    }
    var prev=null;
    var ci=series.findIndex(function(s){return s.v===curr&&s.p===currLbl;});
    for(var j=ci-1;j>=0;j--){
      if(series[j].v!=null){prev=series[j].v;break;}
    }
    var trend=curr===null?'—':prev===null?'→':curr>prev?'↑':curr<prev?'↓':'→';
    return {u:u,curr:curr,currLbl:currLbl,trend:trend};
  });

  function makeTipDiarr(){
    return function T(p){
      if(!p.active||!p.payload||!p.payload.length) return null;
      var items=p.payload.filter(function(x){return x.value!=null&&x.value>0;})
        .sort(function(a,b){return b.value-a.value;});
      if(!items.length) return null;
      return h('div',{style:{background:WHITE,border:'1px solid '+BRDR,borderRadius:6,
        padding:'10px 14px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,0.12)',minWidth:180}},
        h('div',{style:{color:LIGHT,fontSize:10,marginBottom:6}},'Diarreia /1000 pac-dia · '+p.label),
        items.map(function(it,i){
          return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',gap:14,marginBottom:2}},
            h('span',{style:{color:SLATE,fontSize:11}},it.name),
            h('span',{style:{color:it.color,fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:700}},
              it.value.toFixed(2))
          );
        })
      );
    };
  }

  return h('div',{className:'fi'},
    // KPI strip
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}},
      kpis.map(function(k,i){
        var ok=k.curr==null||k.curr<20;
        return h('div',{key:i,style:{background:WHITE,border:'1px solid '+(ok?BRDR:k.u.color+'55'),
          borderRadius:8,padding:'10px 14px',flex:'1',minWidth:120,
          boxShadow:ok?'0 1px 3px rgba(0,0,0,0.06)':'0 2px 8px '+k.u.color+'22',
          position:'relative',overflow:'hidden'}},
          h('div',{style:{position:'absolute',top:0,left:0,width:'100%',height:3,background:k.u.color}}),
          h('div',{style:{fontSize:9,color:SLATE,marginBottom:4,marginTop:2}},k.u.label),
          h('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
            k.curr!=null
              ?h('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:26,fontWeight:700,
                  color:ok?NAVY:k.u.color,lineHeight:1}},k.curr.toFixed(1))
              :h('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:26,color:MUTED}},'—'),
            k.trend!=='—'?h('span',{style:{fontSize:14,fontWeight:700,
              color:k.trend==='↑'?RED:k.trend==='↓'?GREEN:MUTED}},k.trend):null
          ),
          h('div',{style:{fontSize:8,color:MUTED,marginTop:4}},k.currLbl+' · /1000 pac-dia')
        );
      })
    ),
    // Line chart
    h('div',{style:{background:WHITE,border:'1px solid '+BRDR,borderRadius:8,
      padding:'16px 16px 10px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',marginBottom:12}},
      h('div',{style:{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:11,fontWeight:600,
        color:NAVY,marginBottom:4}},'Densidade de Incidência de Diarreia Hospitalar (/1000 pac-dia)'),
      h('div',{style:{fontSize:8,color:MUTED,marginBottom:12}},
        'Vigilância iniciada em jun/2025 · diarreia instalada ≥48h após admissão em paciente previamente sem diarreia'),
      h(RCont,{width:'100%',height:300},
        h(ComposedChart,{data:chartData,margin:{top:8,right:12,left:-20,bottom:0}},
          h(CartGrid,{strokeDasharray:'2 4',stroke:GRID,vertical:false}),
          pvFirst?h(RefArea,{x1:pvFirst,x2:pvLast,fill:'#f0f2f5',fillOpacity:0.7,stroke:'none'}):null,
          pvLast?h(RefLine,{x:pvLast,stroke:'#9eaab8',strokeDasharray:'4 3',strokeWidth:1.2,
            label:{value:'2026',fill:'#9eaab8',fontSize:8,position:'insideTopRight'}}):null,
          h(XAxis,{dataKey:'m',tick:{fill:LIGHT,fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false}),
          h(YAxis,{tick:{fill:LIGHT,fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,allowDecimals:true}),
          h(RCTip,{content:makeTipDiarr()}),
          h(Legend,{iconSize:8,wrapperStyle:{fontSize:9,color:SLATE,paddingTop:6}}),
          DUNITS.map(function(u){
            return [
              h(Line,{key:u.key+'_p',type:'monotone',dataKey:u.key+'_prev',
                stroke:u.color,strokeWidth:1.5,strokeOpacity:0.25,
                dot:false,connectNulls:true,legendType:'none',name:undefined}),
              h(Line,{key:u.key+'_c',type:'monotone',dataKey:u.key+'_curr',
                stroke:u.color,strokeWidth:2,strokeOpacity:1,
                dot:{r:3,fill:u.color,stroke:WHITE,strokeWidth:1.5},
                connectNulls:true,legendType:'plainline',name:u.label,
                activeDot:{r:5,fill:u.color,stroke:WHITE,strokeWidth:2}})
            ];
          }).reduce(function(a,b){return a.concat(b);})
        )
      )
    )
  );
}

  var D=props.D,s=D.mdrInst.s;
  var last=s[s.length-1],prev=s[s.length-2];

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  var s1=useState('overview'); var active=s1[0],setActive=s1[1];
  var s2=useState(null);       var D=s2[0],setD=s2[1];
  var s3=useState(true);       var loading=s3[0],setLoading=s3[1];

  useEffect(function(){
    setD(FB); setLoading(false);
    fetch('./data_iras.json?t='+Date.now())
      .then(function(r){return r.json();})
      .then(function(d){
        // ── Helper: merge FB points missing from JSON series by label ──────────
        function mergeFBPoints(jsArr, fbArr) {
          if(!Array.isArray(jsArr)||!Array.isArray(fbArr)) return jsArr;
          var jsLabels={};
          jsArr.forEach(function(pt){ jsLabels[pt.p]=true; });
          var missing=fbArr.filter(function(pt){ return !pt.c&&!jsLabels[pt.p]; });
          if(!missing.length) return jsArr;
          // Insert missing FB points in chronological position
          var combined=missing.concat(jsArr);
          // Sort: annual (4-digit) before monthly (mmm/yy), then by year/month
          var MO=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
          combined.sort(function(a,b){
            function rank(p){
              if(/^\d{4}$/.test(p)) return parseInt(p)*100-1;
              var parts=p.split('/');
              return (2000+parseInt(parts[1]))*100+MO.indexOf(parts[0]);
            }
            return rank(a.p)-rank(b.p);
          });
          return combined;
        }

        // ── Restore lMin/lMax from FB + add missing FB points ─────────────────
        var MERGE_SERIES={
          utiAB:['svd','cvc','tot','pav','itu','ipcs','dddPip','dddCarba','dddGlico','dddPoli','hm'],
          utic: ['svd','cvc','tot','pav','itu','ipcs','dddPip','dddCarba','dddGlico','dddPoli','hm'],
          utiNeo:['ipcs'],
          hd:['ilav','bact','vanco'],
          clinicaMedica:['taxaIH'],
          clinicaCirurgica:['taxaIH'],
          epm:['taxaIH'],
          global:['taxaIH']
        };
        Object.keys(MERGE_SERIES).forEach(function(unit){
          if(!d[unit]||!FB[unit]) return;
          MERGE_SERIES[unit].forEach(function(key){
            var jsArr=d[unit][key], fbArr=FB[unit][key];
            if(!Array.isArray(jsArr)||!Array.isArray(fbArr)) return;
            // 1. Add missing FB points
            jsArr=mergeFBPoints(jsArr,fbArr);
            // 2. Restore lMin/lMax for points that have them in FB
            var fbMap={};
            fbArr.forEach(function(pt){ if(pt.lMin!=null||pt.lMax!=null) fbMap[pt.p]=pt; });
            d[unit][key]=jsArr.map(function(pt){
              var fb=fbMap[pt.p];
              if(!fb) return pt;
              var merged=Object.assign({},pt);
              if(fb.lMin!=null) merged.lMin=fb.lMin;
              if(fb.lMax!=null) merged.lMax=fb.lMax;
              return merged;
            });
          });
        });

        // ── Inject limiares from JSON into most recent historical point ────────
        // (the point that was c:1 last month, now historical — carries this month's thresholds)
        var LIM_MAP={
          svd:     {max:'svdMax',  min:'svdMin'},
          cvc:     {max:'cvcMax',  min:'cvcMin'},
          tot:     {max:'totMax',  min:'totMin'},
          pav:     {max:'pavMax',  min:null},
          itu:     {max:'ituMax',  min:null},
          ipcs:    {max:'ipcsMax', min:null},
          dddPip:  {max:'pipMax',  min:'pipMin'},
          dddCarba:{max:'carbaMax',min:'carbaMin'},
          dddGlico:{max:'glicoMax',min:'glicoMin'},
          dddPoli: {max:'poliMax', min:'poliMin'}
        };
        ['utiAB','utic'].forEach(function(unit){
          var lim=d[unit]&&d[unit].limiares;
          if(!lim) return;
          Object.keys(LIM_MAP).forEach(function(key){
            var arr=d[unit][key];
            if(!Array.isArray(arr)||!arr.length) return;
            var m=LIM_MAP[key];
            arr=arr.slice();
            // Inject into every point that lacks lMin/lMax (both historical and current)
            arr=arr.map(function(pt){
              if((m.max&&lim[m.max]!=null&&pt.lMax==null)||(m.min&&lim[m.min]!=null&&pt.lMin==null)){
                // Only inject into the last historical point and the c:1 point
                return pt; // handled below
              }
              return pt;
            });
            // Find last non-c point and the c:1 point
            var lastHistIdx=-1;
            var currIdx=-1;
            for(var i=arr.length-1;i>=0;i--){
              if(arr[i].c&&currIdx<0) currIdx=i;
              else if(!arr[i].c&&lastHistIdx<0) lastHistIdx=i;
              if(lastHistIdx>=0&&currIdx>=0) break;
            }
            [lastHistIdx,currIdx].forEach(function(idx){
              if(idx<0) return;
              var pt=Object.assign({},arr[idx]);
              if(m.max&&lim[m.max]!=null) pt.lMax=lim[m.max];
              if(m.min&&lim[m.min]!=null) pt.lMin=lim[m.min];
              arr[idx]=pt;
            });
            d[unit][key]=arr;
          });
        });
        // Neo ipcsMax
        if(d.utiNeo&&d.utiNeo.limiares&&d.utiNeo.ipcs){
          var neoLim=d.utiNeo.limiares.ipcsMax;
          var neoArr=d.utiNeo.ipcs.slice();
          for(var i=neoArr.length-1;i>=0;i--){
            if(neoLim!=null){
              var pt=Object.assign({},neoArr[i]);
              pt.lMax=neoLim;
              neoArr[i]=pt;
            }
            if(!neoArr[i].c) break; // only inject into c:1 and last historical
          }
          d.utiNeo.ipcs=neoArr;
        }

        // ── auditSeries: merge FB historical + JSON ────────────────────────────
        ['utiAB','utic','utiNeo'].forEach(function(unit){
          var fbAs=FB[unit]&&FB[unit].auditSeries;
          var jAs=d[unit]&&d[unit].auditSeries;
          if(!Array.isArray(fbAs)) return;
          if(!Array.isArray(jAs)||!jAs.length){
            if(d[unit]) d[unit].auditSeries=fbAs;
            return;
          }
          // Merge: FB as base, JSON points override/extend
          var map={};
          fbAs.forEach(function(x){ map[x.p]=x; });
          jAs.forEach(function(x){ map[x.p]=x; });
          var merged=Object.keys(map).map(function(k){ return map[k]; });
          var MO2=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
          merged.sort(function(a,b){
            function rank(p){
              if(/^\d{4}$/.test(p)) return parseInt(p)*100-1;
              var parts=p.split('/');
              return (2000+parseInt(parts[1]))*100+MO2.indexOf(parts[0]);
            }
            return rank(a.p)-rank(b.p);
          });
          d[unit].auditSeries=merged;
        });

        // ── HD monthly: merge FB historical + current JSON point ──────────────
        var HD_MONTHLY=['ilavTemp','ilavPerm','bactTemp','bactPerm'];
        if(d.hd){
          HD_MONTHLY.forEach(function(k){
            var jv=d.hd[k], fbv=FB.hd&&FB.hd[k];
            if(!Array.isArray(jv)||!Array.isArray(fbv)) return;
            var onlyCurr=jv.length>0&&jv.every(function(x){return x.c;});
            if(onlyCurr){
              var currLabel=jv[0].p;
              var hist=fbv.filter(function(x){return !x.c&&x.p!==currLabel;});
              d.hd[k]=hist.concat(jv);
            }
          });
        }

        // ── Diarreia ──────────────────────────────────────────────────────────
        if(d.diarreia){
          var DIARR_KEYS=['cm','cc','epm','utiab','utic'];
          DIARR_KEYS.forEach(function(k){
            var jv=d.diarreia[k], fbv=FB.diarreia&&FB.diarreia[k];
            if(!Array.isArray(jv)||!Array.isArray(fbv)) return;
            var onlyCurr=jv.length>0&&jv.every(function(x){return x.c;});
            if(onlyCurr){
              var currLabel=jv[0].p;
              var hist=fbv.filter(function(x){return !x.c&&x.p!==currLabel;});
              d.diarreia[k]=hist.concat(jv);
            }
          });
        }

        setD(d);
      })
      .catch(function(){});
  },[]);

  if(loading) return h('div',{style:{display:'flex',alignItems:'center',
    justifyContent:'center',height:'100vh',flexDirection:'column',gap:14}},
    h('div',{className:'pulse',style:{width:36,height:36,borderRadius:'50%',
      background:BLUE,opacity:.4}}),
    h('div',{style:{color:SLATE,fontSize:12}},'Carregando dados...')
  );

  function renderSection(){
    switch(active){
      case 'overview':         return h(OverviewSection,{D:D});
      case 'mdrInst':          return h(MdrInstSection,{D:D});
      case 'abio':             return h(AbioSection,{D:D});
      case 'utiAB':            return h(UtiSection,{D:D,u:'utiAB'});
      case 'utic':             return h(UtiSection,{D:D,u:'utic'});
      case 'utiNeo':           return h(UtiNeoSection,{D:D});
      case 'hd':               return h(HdSection,{D:D});
      case 'clinicaMedica':    return h(ClinicaSection,{D:D,which:'clinicaMedica'});
      case 'clinicaCirurgica': return h(ClinicaSection,{D:D,which:'clinicaCirurgica'});
      case 'epm':              return h(ClinicaSection,{D:D,which:'epm'});
      case 'diarreia':         return h(DiarreiaSection,{D:D});
      default: return null;
    }
  }

  return h('div',{style:{display:'flex',height:'100vh',background:BG}},
    // ── Sidebar ──
    h('div',{style:{width:210,minWidth:210,background:'#1a2744',
      borderRight:'1px solid #0f1e38',display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{padding:'18px 16px 14px',borderBottom:'1px solid #0f1e38'}},
        h('div',{style:{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:700,
          color:'#4db6ac',letterSpacing:.2}},'SCIH / CCIH'),
        h('div',{style:{fontSize:9,color:'#7b9bbf',marginTop:2}},
          'Hospital Universitário São Francisco'),
        h('div',{style:{fontSize:8,color:'#5a7a9a',marginTop:1}},'Bragança Paulista · SP'),
        h('div',{style:{display:'inline-flex',alignItems:'center',gap:5,marginTop:10,
          background:'rgba(0,105,92,.15)',padding:'3px 9px',borderRadius:4,
          border:'1px solid rgba(77,182,172,.25)'}},
          h('div',{className:'pulse',style:{width:5,height:5,borderRadius:'50%',background:'#4db6ac'}}),
          h('span',{style:{fontSize:8,color:'#4db6ac',fontWeight:600}},D.periodo)
        ),
        h('a',{href:'./entrada_dados.html',style:{display:'block',marginTop:10,
          background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',
          borderRadius:6,padding:'5px 10px',color:'#9ab0cc',fontSize:9,
          textDecoration:'none',textAlign:'center',fontWeight:500}},
          '⊕ Atualizar dados')
      ),
      h('div',{style:{flex:1,overflowY:'auto',padding:'6px 0',background:'#1a2744'}},
        groups.map(function(g){
          return h('div',{key:g},
            h('div',{style:{padding:'10px 16px 3px',fontSize:9,color:'#5a7a9a',
              letterSpacing:.5,fontWeight:600,textTransform:'uppercase'}},g),
            NAV.filter(function(n){return n.g===g;}).map(function(item){
              var isA=active===item.id;
              return h('button',{key:item.id,onClick:function(){setActive(item.id);},
                style:{width:'100%',display:'flex',alignItems:'center',gap:8,
                  padding:'8px 16px',border:'none',cursor:'pointer',
                  background:isA?'rgba(255,255,255,.08)':'transparent',
                  borderLeft:isA?'3px solid #4db6ac':'3px solid transparent',
                  color:isA?'#4db6ac':'#9ab0cc',
                  fontFamily:"'IBM Plex Sans',sans-serif",
                  fontSize:11,fontWeight:isA?600:400,textAlign:'left'}},
                h('span',{style:{fontSize:10,color:isA?'#4db6ac':'#5a7a9a',minWidth:12}},item.ic),
                item.l
              );
            })
          );
        })
      ),
      h('div',{style:{padding:'10px 16px',borderTop:'1px solid #0f1e38'}},
        h('div',{style:{fontSize:8,color:'#5a7a9a',marginBottom:10,fontWeight:600,
          letterSpacing:.5,textTransform:'uppercase'}},
          'Outros Dashboards'),
        h('a',{href:'https://doutorleandromendes.github.io/vigilancia_husf/mdr_mensal.html',
          target:'_blank',rel:'noopener',
          style:{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',

            background:'rgba(197,40,40,.10)',border:'1px solid rgba(197,40,40,.25)',

          onMouseLeave:function(e){e.currentTarget.style.background='rgba(197,40,40,.10)';}},
          h('span',{style:{fontSize:11}},'⬟'),
          h('span',{},'Resistência Bacteriana'),
          h('span',{style:{marginLeft:'auto',fontSize:9,opacity:.6}},'↗')
        ),
        h('a',{href:'https://doutorleandromendes.github.io/vigilancia_husf/atb_dots.html',
          target:'_blank',rel:'noopener',
          style:{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',

            background:'rgba(21,101,192,.10)',border:'1px solid rgba(21,101,192,.25)',

        )
      )
    ),
    // ── Main ──
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{padding:'12px 20px',borderBottom:'1px solid '+BRDR,
        background:WHITE,display:'flex',justifyContent:'space-between',
        alignItems:'center',flexShrink:0}},
        h('div',{},
          h('h1',{style:{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,
            fontWeight:600,color:NAVY,margin:0}},TITLES[active]),
          h('div',{style:{fontSize:9,color:LIGHT,marginTop:2}},
            'HUSF · SCIH/CCIH · '+D.periodo)
        ),
        (function(){
          var st=(D.global&&D.global.status)||'endemic';
          var cfg={endemic:{bg:'#e8f5e9',bc:GREEN+'44',dot:GREEN,c:GREEN,lbl:'Atividade ENDÊMICA'},
            alert:{bg:'#fff3e0',bc:'#e65100'+'44',dot:'#e65100',c:'#e65100',lbl:'⚠ Alerta supraendêmico'},
            exceptional:{bg:'#ffebee',bc:'#c62828'+'44',dot:'#c62828',c:'#c62828',lbl:'⚠⚠ Atividade excepcional'}};
          var s=cfg[st]||cfg.endemic;
          return h('div',{style:{display:'flex',alignItems:'center',gap:6,background:s.bg,
            padding:'5px 12px',borderRadius:6,border:'1px solid '+s.bc}},
            h('div',{style:{width:6,height:6,borderRadius:'50%',background:s.dot}}),
            h('span',{style:{fontSize:9,color:s.c,fontWeight:600}},s.lbl));
        })()
      ),
      h('div',{key:active,style:{flex:1,overflowY:'auto',padding:16}},renderSection(),h(MetodFooter))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
