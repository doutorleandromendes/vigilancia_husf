<script>
'use strict';
if (!window.React||!window.ReactDOM||!window.Recharts){
  document.getElementById('root').innerHTML='<div style="color:#f87171;padding:40px;font-family:monospace">Erro: biblioteca não carregada.</div>';
  throw new Error('lib fail');
}
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo;

// ── Tokens ────────────────────────────────────────────────────────────────────
var C={bg:'#f0f2f5',surf:'#ffffff',card:'#ffffff',hover:'#f0f2f5',brdr:'#d0d7de',glow:'#b0bec5',teal:'#00695c',blue:'#1565c0',indigo:'#4527a0',amber:'#e65100',red:'#c62828',green:'#2e7d32',ti:'#1a2744',ts:'#4a5568',tm:'#8898aa',hist:'#9eaab8',curr:'#1565c0'};

// Organism metadata — KPC and Acinetobacter are PRIORITY
var ORGS=[
  {key:'kpc',  label:'KPC',            color:'#c62828', priority:true,  stroke:2.5, dot:4},
  {key:'acin', label:'Acinetobacter',  color:'#1565c0', priority:true,  stroke:2.5, dot:4},
  {key:'esbl', label:'ESBL',           color:'#2e7d32', priority:false, stroke:1.5, dot:3},
  {key:'pseu', label:'Pseudomonas',    color:'#6a1b9a', priority:false, stroke:1.5, dot:2},
];

var MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── Recharts ──────────────────────────────────────────────────────────────────
var RC=Recharts;
var ComposedChart=RC.ComposedChart,BarChart=RC.BarChart,Bar=RC.Bar;
var LineChart=RC.LineChart,Line=RC.Line;
var XAxis=RC.XAxis,YAxis=RC.YAxis,CartGrid=RC.CartesianGrid;
var RCTip=RC.Tooltip,RCont=RC.ResponsiveContainer,Legend=RC.Legend;
var RefLine=RC.ReferenceLine,RefArea=RC.ReferenceArea,Cell=RC.Cell,Area=RC.Area;

// ── Tooltip ───────────────────────────────────────────────────────────────────
function makeTip(unit){
  return function T(p){
    if(!p.active||!p.payload||!p.payload.length) return null;
    var items=p.payload.filter(function(x){return x.value!=null&&x.value>0;})
                       .sort(function(a,b){return b.value-a.value;});
    if(!items.length) return null;
    return h('div',{style:{background:C.surf,border:'1px solid '+C.glow,borderRadius:8,
      padding:'10px 14px',fontSize:12,minWidth:160}},
      h('div',{style:{color:C.ts,fontSize:10,marginBottom:6,fontWeight:600}},p.label),
      items.map(function(it,i){
        return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',
          gap:14,marginBottom:2}},
          h('span',{style:{color:it.color||C.ts,fontFamily:"'IBM Plex Sans',sans-serif",fontSize:11}},it.name),
          h('span',{style:{color:it.color||C.ti,fontFamily:"'IBM Plex Mono',monospace",
            fontSize:11,fontWeight:700}},
            typeof it.value==='number'?it.value.toFixed(2):it.value)
        );
      }),
      p.payload[0]&&p.payload[0].payload&&p.payload[0].payload.pd>0
        ? h('div',{style:{color:C.tm,fontSize:9,marginTop:5,borderTop:'1px solid '+C.brdr,paddingTop:4}},
            p.payload[0].payload.pd+' pac-dia')
        : null
    );
  };
}

// ── Build 13-month window from series data ─────────────────────────────────────
function buildChartData(unitData, orgs){
  // Use esbl series as the timeline reference (longest series)
  var ref=(unitData.esbl||unitData.kpc||[]);
  // Take last 13 points (or fewer if not enough data)
  var pts=ref.slice(-13);
  if(!pts.length) return [];

  // Determine "current year" from last point's label (e.g. 'fev/26' → '26')
  var lastLbl=(pts[pts.length-1]||{}).p||'';
  var currYr=lastLbl.split('/')[1]||'';

  return pts.map(function(refPt,i){
    var lbl=refPt.p;
    var ptYr=(lbl||'').split('/')[1]||'';
    var prev=ptYr!==currYr;
    var row={m:lbl,prev:prev,pd:refPt.pd};
    orgs.forEach(function(org){
      var series=unitData[org.key]||[];
      // Find matching point by label
      var sp=series.find(function(s){return s.p===lbl;});
      var v=sp&&sp.v!=null?sp.v:null;
      row[org.key]=v;
      // Split into prev/curr segments for faded line rendering
      row[org.key+'_prev']=prev?v:null;
      row[org.key+'_curr']=!prev?v:null;
      // Share boundary point on both segments for visual continuity
      var isFirst=!prev&&i>0&&pts[i-1]&&(pts[i-1].p||'').split('/')[1]!==currYr;
      if(isFirst){ row[org.key+'_prev']=v; }
    });
    return row;
  });
}

// ── CHART: Multi-line with KPC/Acin emphasis, year-split fading ───────────────
function LineChart4(props){
  var data=props.data, ht=props.h||280, showLegend=props.showLegend!==false;
  var orgs=props.orgs||ORGS;

  // Find prev-year zone boundaries for ReferenceArea
  var pvFirst=null,pvLast=null;
  data.forEach(function(d){if(d.prev){if(!pvFirst)pvFirst=d.m;pvLast=d.m;}});

  return h(RCont,{width:'100%',height:ht},
    h(ComposedChart,{data:data,margin:{top:8,right:12,left:-20,bottom:0}},
      h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false,opacity:1}),
      // Shade prev-year zone
      pvFirst?h(RefArea,{x1:pvFirst,x2:pvLast,fill:'#f0f2f5',fillOpacity:0.7,stroke:'none'}):null,
      // Year boundary line
      pvLast?h(RefLine,{x:pvLast,stroke:'#9eaab8',strokeDasharray:'4 3',strokeWidth:1.2}):null,
      h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false}),
      h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false,allowDecimals:true}),
      h(RCTip,{content:makeTip('‰')}),
      showLegend?h(Legend,{iconSize:8,wrapperStyle:{fontSize:9,color:C.ts,paddingTop:6}}):null,
      // Render each organism as two Lines: prev year (faded) + curr year (full)
      orgs.map(function(org){
        return [
          // Prev-year segment — faded, no legend entry
          h(Line,{key:org.key+'_p',type:'monotone',dataKey:org.key+'_prev',
            stroke:org.color,strokeWidth:org.stroke||1.5,strokeOpacity:0.25,
            dot:false,connectNulls:true,legendType:'none',name:undefined}),
          // Current-year segment — full, carries legend
          h(Line,{key:org.key+'_c',type:'monotone',dataKey:org.key+'_curr',
            stroke:org.color,strokeWidth:org.stroke||1.5,strokeOpacity:1,
            dot:{r:org.dot||3,fill:org.color,stroke:'#fff',strokeWidth:1.5},
            connectNulls:true,legendType:'plainline',
            name:org.label,
            activeDot:{r:5,fill:org.color,stroke:'#fff',strokeWidth:2}})
        ];
      }).reduce(function(a,b){return a.concat(b);},[])
    )
  );
}

// ── CHART: Stacked bar — counts per organism ──────────────────────────────────
function CountBarChart(props){
  var unitData=props.unitData, ht=props.h||180;
  // Use same 13-point window as LineChart4 — key from counts array position
  var ref=(unitData.esbl||unitData.kpc||[]);
  var pts=ref.slice(-13);
  var lastLbl=(pts[pts.length-1]||{}).p||'';
  var currYr=(lastLbl.split('/')[1])||'';
  var data=pts.map(function(refPt,i){
    var lbl=refPt.p;
    var prev=(lbl.split('/')[1]||'')!==currYr;
    var row={m:lbl,prev:prev};
    // Find absolute index in the full series for counts lookup
    var absIdx=ref.length-13+i;
    ORGS.forEach(function(org){
      var counts=(unitData.counts&&unitData.counts[org.key])||[];
      row[org.key]=counts[absIdx]!=null?counts[absIdx]:0;
    });
    return row;
  });
  var pvFirst=null,pvLast=null;
  data.forEach(function(d){if(d.prev){if(!pvFirst)pvFirst=d.m;pvLast=d.m;}});
  return h(RCont,{width:'100%',height:ht},
    h(BarChart,{data:data,margin:{top:4,right:8,left:-24,bottom:0},barCategoryGap:'25%'},
      h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false,opacity:1}),
      pvFirst?h(RefArea,{x1:pvFirst,x2:pvLast,fill:'#f0f2f5',fillOpacity:0.7,stroke:'none'}):null,
      pvLast?h(RefLine,{x:pvLast,stroke:'#9eaab8',strokeDasharray:'4 3',strokeWidth:1.2}):null,
      h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false}),
      h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false,allowDecimals:false}),
      h(RCTip,{content:makeTip('')}),
      ORGS.map(function(org){
        return h(Bar,{key:org.key,dataKey:org.key,name:org.label,
          fill:org.color,stackId:'s',maxBarSize:28},
          data.map(function(d,i){
            return h(Cell,{key:i,fill:org.color,
              opacity:d.prev?(org.priority?0.3:0.18):(org.priority?1:0.6)});
          })
        );
      })
    )
  );
}

// ── KPI strip ─────────────────────────────────────────────────────────────────
function KpiStrip(props){
  var unitData=props.unitData,orgs=props.orgs||ORGS;
  return h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}},
    orgs.map(function(org){
      var series=unitData[org.key]||[];
      var currPt=series.filter(function(d){return d.c&&d.v!=null;})[0];
      var curr=currPt?currPt.v:null;
      var currLabel=currPt?currPt.p:'—';
      var histVals=series.filter(function(d){return d.v!=null&&!d.c;}).map(function(d){return d.v;});
      var max=histVals.length?Math.max.apply(null,histVals):0;
      var mean=histVals.length?(histVals.reduce(function(a,b){return a+b;},0)/histVals.length):0;
      var counts=(unitData.counts&&unitData.counts[org.key])||[];
      var totalCounts=counts.reduce(function(a,b){return a+(b||0);},0);
      var alert=curr!=null&&curr>mean&&org.priority;
      return h('div',{key:org.key,style:{background:'#ffffff',
        border:'2px solid '+(org.priority?(alert?org.color:org.color+'66'):C.brdr),
        borderRadius:8,padding:'12px 14px',flex:'1',minWidth:150,
        position:'relative',overflow:'hidden',
        boxShadow:alert?'0 2px 8px '+org.color+'33':'0 1px 3px rgba(0,0,0,0.06)'}},
        h('div',{style:{position:'absolute',top:0,left:0,width:org.priority?'100%':'40%',
          height:3,background:org.priority?org.color:C.brdr}}),
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',
          marginBottom:6,marginTop:2}},
          h('span',{style:{fontSize:9,color:org.priority?org.color:C.ts,
            fontWeight:org.priority?700:500}},org.label),
          h('span',{style:{fontSize:8,color:C.tm,fontFamily:"'IBM Plex Mono',monospace"}},currLabel)
        ),
        h('div',{style:{display:'flex',alignItems:'baseline',gap:5,marginBottom:8}},
          curr!=null
            ?h('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:28,
                fontWeight:700,lineHeight:1,color:alert?org.color:(curr>0?C.ti:'#9ca3af')}},
                curr.toFixed(2))
            :h('span',{style:{fontSize:18,color:'#9ca3af'}},'—'),
          h('span',{style:{fontSize:9,color:C.tm,marginLeft:2}},'‰')
        ),
        h('div',{style:{display:'flex',gap:10,borderTop:'1px solid '+C.brdr,paddingTop:5}},
          h('span',{style:{fontSize:9,color:C.tm}},'Pico ',
            h('span',{style:{color:C.ts,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace"}},max.toFixed(1))),
          h('span',{style:{fontSize:9,color:C.tm}},'Média ',
            h('span',{style:{color:C.ts,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace"}},mean.toFixed(1))),
          h('span',{style:{fontSize:9,color:C.tm}},'n ',
            h('span',{style:{color:C.ts,fontWeight:600}},totalCounts))
        ),
        alert?h('div',{style:{position:'absolute',top:10,right:10,background:org.color,
          color:'#fff',fontSize:7,fontWeight:700,padding:'1px 5px',borderRadius:3}},
          '↑ ACIMA DA MÉDIA'):null
      );
    })
  );
}

// ── DUAL UNIT comparison (UTI AB vs UTIC side by side) ───────────────────────
function DualComparison(props){
  var ab=props.ab, uc=props.uc, org=props.org;
  var abData=buildChartData(ab,[org]);
  var ucData=buildChartData(uc,[org]);
  // merge into single series for comparison
  var merged=MESES.map(function(m,i){
    return {m:m,
      utiab:(ab[org.key]||[])[i]?((ab[org.key]||[])[i].v):null,
      utic: (uc[org.key]||[])[i]?((uc[org.key]||[])[i].v):null};
  });
  return h(RCont,{width:'100%',height:props.h||220},
    h(ComposedChart,{data:merged,margin:{top:8,right:12,left:-20,bottom:0}},
      h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false,opacity:1}),
      h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false}),
      h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},
        axisLine:false,tickLine:false}),
      h(RCTip,{content:makeTip('‰')}),
      h(Legend,{iconSize:8,wrapperStyle:{fontSize:9,color:C.ts,paddingTop:6}}),
      h(Line,{type:'monotone',dataKey:'utiab',name:'UTI A/B',
        stroke:C.blue,strokeWidth:2,dot:{r:3,fill:C.blue},connectNulls:false}),
      h(Line,{type:'monotone',dataKey:'utic',name:'UTI C',
        stroke:C.teal,strokeWidth:2,dot:{r:3,fill:C.teal},connectNulls:false,
        strokeDasharray:'5 3'})
    )
  );
}

// ── Pill button ───────────────────────────────────────────────────────────────
function Pill(props){
  var a=props.active,col=props.color||C.teal;
  return h('button',{onClick:props.onClick,style:{padding:'5px 13px',

}

        h('span',{style:{fontWeight:600,color:'#4a5568'}},'Autoria · '),
        'Sistema de interface desenvolvido por Dr. Leandro Mendes · ',
        'Análises epidemiológicas e estatísticas realizadas por Dr. Leandro Mendes'
      ),
      h('div',{style:{fontSize:8,color:'#b0bec5',fontFamily:"'IBM Plex Mono',monospace"}},
        'SCIH/CCIH · HUSF · Bragança Paulista')
    )
  );
}

    default: content=null;
  }

  return h('div',{style:{background:C.bg,minHeight:'100vh'}},
    topBar,
    h('div',{style:{maxWidth:1140,margin:'0 auto',padding:'20px 24px 48px'}},
      viewSel,
      content,
      h(MetodFooter)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
