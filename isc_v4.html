// ── Activity status ────────────────────────────────────────────────────────────
// 3-level classification used across all views
function actStatus(taxa, lMin, lMax){
  if(lMax==null) return null;
  if(taxa > lMax * 1.5) return {label:'Atividade supraendêmica — alerta de surto', color:'#c62828', bg:'#ffebee'};
  if(taxa > lMax)       return {label:'Possível atividade supraendêmica',           color:'#e65100', bg:'#fff3e0'};
  if(taxa > lMin)       return {label:'Atividade endêmica',                         color:'#2e7d32', bg:'#f1f8e9'};
  return                       {label:'Atividade endêmica',                         color:'#2e7d32', bg:'#f1f8e9'};
}

function ActivityBadge(p){
  var s=actStatus(p.taxa, p.lMin, p.lMax);
  if(!s) return null;
  return h('div',{style:{display:'inline-flex',alignItems:'center',gap:6,
    background:s.bg,border:'1px solid '+s.color+'44',borderRadius:20,
    padding:'3px 10px',fontSize:9,fontWeight:700,color:s.color,letterSpacing:.3}},
    h('div',{style:{width:6,height:6,borderRadius:'50%',background:s.color,flexShrink:0}}),
    s.label
  );
}

    var raw=p.payload[0]&&p.payload[0].payload;
    return h('div',{style:{background:C.surf,border:'1px solid '+C.glow,borderRadius:8,

    );
  };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function enrich13(data){
  var pts=data.filter(function(d){return d.taxa!=null;}).slice(-13);
  return pts.map(function(d,i){
    var r=Object.assign({},d);
    r.taxa_prev=d.prev?d.taxa:null;
    r.taxa_curr=!d.prev?d.taxa:null;
    if(!d.prev&&i>0&&pts[i-1]&&pts[i-1].prev){r.taxa_prev=d.taxa;}
    return r;
  });
}

function EquipesView(){
  // Sort by 2025 taxa desc
  var sorted=[].concat(EQUIPES).sort(function(a,b){return b.taxa25-a.taxa25;});
  var st=useState(sorted[0].eq);
  var selEq=st[0],setSelEq=st[1];
  var selSeries=EQ_SERIES[selEq]||null;
  var selData=EQUIPES.find(function(e){return e.eq===selEq;})||null;

  // 3-year bar data
  var barData=sorted.map(function(d){
    var t26=d.cl26>0?parseFloat((d.isc26/d.cl26*100).toFixed(2)):null;
    return {eq:d.eq,t24:d.taxa24,t25:d.taxa25,t26:t26};
  });

  function eqColor(t){return t>5?P.alerta:(t>2?P.isc:(t>0?'#2e7d32':'#c8d6df'));}
  function eqColor26(t){
    if(t===null||t===undefined) return '#e0e5ea'; // sem dado ainda
    return eqColor(t);
  }

  function trendArrow(d){
    var t26=d.cl26>0?d.isc26/d.cl26*100:null;
    var base=t26!==null?d.taxa25:d.taxa24;
    var curr=t26!==null?t26:d.taxa25;
    var diff=curr-base;
    if(Math.abs(diff)<0.2) return {sym:'\u2014',c:C.tm};
    return diff>0?{sym:'\u25b2',c:P.alerta}:{sym:'\u25bc',c:'#2e7d32'};
  }

  return h('div',{className:'fi'},

    // ── Comparativo Anual + S\u00e9rie Mensal (lado a lado) ───────────────
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}},
      h(Card,{},
        h(SH,{title:'Comparativo Anual',sub:'Somente cirurgias limpas (Classe I) \u00b7 n\u00e3o inclui cesarianas \u00b7 clique para s\u00e9rie',color:'#1565c0'}),
        h('div',{style:{overflowX:'auto'}},
          h('table',{},
            h('thead',{},h('tr',{},
              h('th',{},'Especialidade'),
              h('th',{style:{textAlign:'right'}},'2024 %'),
              h('th',{style:{textAlign:'right'}},'2025 %'),
              h('th',{style:{textAlign:'right'}},'2026 %'),
              h('th',{style:{textAlign:'center'}},'Tend\u00eancia')
            )),
            h('tbody',{},sorted.map(function(d){
              var t26=d.cl26>0?parseFloat((d.isc26/d.cl26*100).toFixed(2)):null;
              var c25=eqColor(d.taxa25);
              var c26=eqColor26(t26);
              var tr=trendArrow(d);
              var sel=d.eq===selEq;
              var hasSeries=!!EQ_SERIES[d.eq];
              return h('tr',{key:d.eq,
                style:{background:sel?'#f0f6ff':'transparent',cursor:hasSeries?'pointer':'default'},
                onClick:function(){if(hasSeries)setSelEq(d.eq);}},
                h('td',{style:{fontWeight:sel?700:500,fontSize:12,color:C.ti}},
                  d.eq+(hasSeries?' \u2197':'')),
                h('td',{style:{textAlign:'right',fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:C.tm}},d.taxa24.toFixed(2)+'%'),
                h('td',{style:{textAlign:'right',fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:700,color:c25}},d.taxa25.toFixed(2)+'%'),
                h('td',{style:{textAlign:'right',fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:t26!==null?700:400,color:c26}},
                  t26!==null?t26.toFixed(2)+'%':'\u2014'),
                h('td',{style:{textAlign:'center',fontSize:12,fontWeight:700,color:tr.c}},tr.sym)
              );
            }))
          )
        ),
        h('div',{style:{fontSize:10,color:C.tm,marginTop:8}},
          '2026 YTD: Jan+Fev via CVE Plan. 1 \u00b7 atualiza mensalmente via JSON \u00b7 \u2197 clique para s\u00e9rie')
      ),

      h(Card,{},
        h(SH,{title:'S\u00e9rie Mensal \u2014 '+selEq,
          sub:selData?'2024: '+selData.taxa24.toFixed(2)+'%  \u00b7  2025: '+selData.taxa25.toFixed(2)+'%':'',
          color:P.taxa}),
        selSeries

var VIEWS=[
  {id:'global',  label:'Visão Global',      sub:'Censo ISC · Jul/25 em diante'},
  {id:'limpas',  label:'Cir. Limpas',       sub:'Classe I · Altemeier'},
  {id:'cesar',   label:'Cesarianas',        sub:'Indicador ANVISA'},
  {id:'equipes', label:'Por Especialidade', sub:'Cir. limpas · NEUCI, CCARD…'},
];
var ICONS={global:'GL',limpas:'CL',cesar:'CS',equipes:'ESP'};

// ── JSON merge helper (same pattern as iras_mdr.html) ────────────────────────
function mergeJsonSeries(fbArr, jsArr){
  // Append JSON points that don't exist in FB (by label p=m, case-insensitive)
  if(!Array.isArray(jsArr)||!jsArr.length) return fbArr;
  var fbLabels={};
  fbArr.forEach(function(pt){fbLabels[(pt.m||pt.p).toLowerCase()]=true;});
  var toAdd=jsArr.filter(function(pt){return !fbLabels[pt.p.toLowerCase()];});
  toAdd=toAdd.map(function(pt){
    // Normalise: JSON uses {p,isc,cl,taxa,proc,pd,c} → FB uses {m,...}
    var r=Object.assign({},pt,{m:pt.p,prev:false});
    delete r.p;
    // limpas/cesar: JSON uses 'cl' or 'proc' as denominator; FB uses 'proc'
    if(r.cl!=null && r.proc==null) r.proc=r.cl;
    if(r.proc!=null && r.cl==null) r.cl=r.proc;
    return r;
  });
  return fbArr.concat(toAdd);
}

function App(){
  var sv=useState('global'); var view=sv[0],setView=sv[1];
  var sl=useState(false);    var loaded=sl[0],setLoaded=sl[1];

  useEffect(function(){
    fetch('./data_iras.json?t='+Date.now())
      .then(function(r){return r.json();})
      .then(function(d){
        var isc=d.isc||{};
        // Extend mutable series from JSON isc section
        if(Array.isArray(isc.limpas)&&isc.limpas.length){
          var ext=mergeJsonSeries(LIMPAS,isc.limpas);
          LIMPAS.length=0; ext.forEach(function(x){LIMPAS.push(x);});
        }
        if(Array.isArray(isc.cesar)&&isc.cesar.length){
          var ext2=mergeJsonSeries(CESAR,isc.cesar);
          CESAR.length=0; ext2.forEach(function(x){CESAR.push(x);});
        }
        if(Array.isArray(isc.global)&&isc.global.length){
          var ext3=mergeJsonSeries(GLOBAL,isc.global);
          GLOBAL.length=0; ext3.forEach(function(x){GLOBAL.push(x);});
        }
        // Extend EQ_SERIES from JSON isc.equipes
        if(isc.equipes&&typeof isc.equipes==='object'){
          Object.keys(isc.equipes).forEach(function(spec){
            var jsArr=isc.equipes[spec];
            if(!Array.isArray(jsArr)) return;
            var labelMap={'NEUCI':'Neurocirurg.','CCARD':'Cardíaca','CIVAS':'Vascular',
              'ORTOP':'Ortopedia','GINEC':'Ginecologia','CGERA':'Cx Geral',
              'UROCI':'Urologia','PLAST':'Plástica','CIRPE':'Ci.Ped.','TORAX':'Torácica'};
            var label=labelMap[spec]||spec;
            if(!EQ_SERIES[label]) EQ_SERIES[label]=[];
            var ext4=mergeJsonSeries(EQ_SERIES[label],jsArr);
            EQ_SERIES[label]=ext4;
          });
        }
        // Update EQUIPES 2026 accumulator from JSON isc.equipes26acum
        if(isc.equipes26acum&&typeof isc.equipes26acum==='object'){
          EQUIPES.forEach(function(eq){
            var labelToSpec={'Neurocirurg.':'NEUCI','Cardíaca':'CCARD','Vascular':'CIVAS',
              'Ortopedia':'ORTOP','Ginecologia':'GINEC','Cx Geral':'CGERA',
              'Urologia':'UROCI','Plástica':'PLAST','Ci.Ped.':'CIRPE','Torácica':'TORAX'};
            var spec=labelToSpec[eq.eq];
            var a=spec&&isc.equipes26acum[spec];
            if(a){eq.isc26=a.isc||0;eq.cl26=a.cl||0;}
          });
        }
        setLoaded(true);
      })
      .catch(function(){setLoaded(true);}); // silent — FB serves as fallback
  },[]);

  var curr=VIEWS.find(function(v){return v.id===view;})||VIEWS[0];
  return h('div',{style:{display:'flex',minHeight:'100vh'}},
    h('div',{style:{width:192,background:'#1a2744',display:'flex',flexDirection:'column',
      position:'sticky',top:0,height:'100vh',overflowY:'auto',flexShrink:0}},
      h('div',{style:{padding:'20px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.07)'}},
        h('div',{style:{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.38)',letterSpacing:2,marginBottom:5}},'CCIH \u00b7 HUSF'),
        h('div',{style:{fontSize:14,fontWeight:700,color:'#ffffff',lineHeight:1.3}},
          'Infec\u00e7\u00e3o de',h('br'),'S\u00edtio Cir\u00fargico'),
        h('div',{style:{fontSize:9,color:'rgba(255,255,255,.28)',marginTop:3,
          fontFamily:"'IBM Plex Mono',monospace"}},'ISC \u00b7 2024\u20132026')
      ),
      h('div',{style:{padding:'12px 8px',flex:1}},
        VIEWS.map(function(v){
          var active=view===v.id;
          return h('button',{key:v.id,onClick:function(){setView(v.id);},
            style:{display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'10px 10px',borderRadius:7,border:'none',textAlign:'left',marginBottom:2,
              background:active?'rgba(255,255,255,.11)':'transparent',
              borderLeft:active?'3px solid #4fc3f7':'3px solid transparent',
              transition:'background .12s,border-color .12s'}},
            h('div',{style:{width:28,height:28,borderRadius:6,flexShrink:0,
              background:active?'rgba(79,195,247,.18)':'rgba(255,255,255,.07)',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:9,fontWeight:700,color:active?'#4fc3f7':'rgba(255,255,255,.5)',
              fontFamily:"'IBM Plex Mono',monospace"}},ICONS[v.id]),
            h('div',{},
              h('div',{style:{fontSize:11,fontWeight:active?700:500,
                color:active?'#ffffff':'rgba(255,255,255,.58)',lineHeight:1.2}},v.label),
              h('div',{style:{fontSize:9,color:'rgba(255,255,255,.28)',marginTop:1}},v.sub)
            )
          );
        })
      ),
      h('div',{style:{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,.06)'}},
        h('div',{style:{fontSize:9,color:'rgba(255,255,255,.18)',lineHeight:1.9}},
          'SCIH / HUSF',h('br'),'Bragan\u00e7a Paulista, SP',h('br'),'\u00a9 CCIH 2026')
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:'24px 24px 48px'}},
      h('div',{style:{marginBottom:20}},
        h('div',{style:{fontSize:9,fontWeight:600,color:'#8898aa',letterSpacing:2,marginBottom:4}},
          'CCIH / HUSF \u00b7 VIGIL\u00c2NCIA EPIDEMIOL\u00d3GICA'),
        h('h1',{style:{fontSize:22,fontWeight:700,color:'#1a2744'}},curr.label),
        h('div',{style:{fontSize:11,color:'#8898aa',marginTop:2}},
          curr.id==='global'?'Jul/2025 \u2013 Mar/2026 \u00b7 Fonte: Censo ISC HUSF':
          curr.id==='equipes'?'Jan/2024 \u2013 Dez/2025 + 2026 YTD \u00b7 Fonte: CVE Plan. 1':
          'Jan/2024 \u2013 Dez/2025 + 2026 \u00b7 Fonte: CVE Plan. 1'+(curr.id==='cesar'?' / 1B':'')
        )
      ),
      view==='global' ?h(GlobalView,{}):
      view==='limpas' ?h(LimpasView,{}):
      view==='cesar'  ?h(CesarView,{}):
                       h(EquipesView,{})
    )
  );
}
ReactDOM.render(h(App,{}),document.getElementById('root'));
</script>
