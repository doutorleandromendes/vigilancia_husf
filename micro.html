// ── TOOLTIPS ──────────────────────────────────────────────────────────────────
function TipBase(p){
  if(!p.active||!p.payload||!p.payload.length) return null;
  var items=p.payload.filter(function(x){return x.value!=null&&x.value!==0;});
  if(!items.length) return null;
  return h('div',{style:{background:'#fff',border:'1px solid '+C.glow,borderRadius:6,padding:'8px 12px',fontSize:11,minWidth:130}},
    h('div',{style:{fontWeight:600,marginBottom:4,color:C.ts,fontSize:10}},p.label),
    items.map(function(it,i){
      return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',gap:12}},
        h('span',{style:{color:it.color||C.ts}},it.name),
        h('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}},typeof it.value==='number'?it.value.toFixed(1):it.value)
      );
    })
  );
}
function TipTempo(p){
  if(!p.active||!p.payload||!p.payload.length) return null;
  var d=p.payload[0]&&p.payload[0].payload;
  if(!d) return null;
  return h('div',{style:{background:'#fff',border:'1px solid '+C.glow,borderRadius:6,padding:'8px 12px',fontSize:11}},
    h('div',{style:{fontWeight:600,marginBottom:4}},d.org),
    h('div',null,'Mediana: '+d.med+'h'),
    h('div',{style:{color:C.tm}},'IQR: '+d.p25+'h – '+d.p75+'h'),
    h('div',{style:{color:C.tm}},'n = '+d.n)
  );
}
function TipStaph(p){
  if(!p.active||!p.payload||!p.payload.length) return null;
  var d=p.payload[0]&&p.payload[0].payload;
  if(!d) return null;
  var mr=d.mrsa!=null?d.mrsa:d.oxar;
  var lbl=d.mrsa!=null?'MRSA':'MR-SCN';
  return h('div',{style:{background:'#fff',border:'1px solid '+C.glow,borderRadius:6,padding:'8px 12px',fontSize:11}},
    h('div',{style:{fontWeight:600,marginBottom:4}},d.g),
    h('div',null,'n = '+d.n),
    h('div',null,lbl+': '+mr+' ('+d.pct+'%)'),
    h('div',{style:{color:C.tm}},'Sensível: '+(d.n-mr)+' ('+(100-d.pct)+'%)')
  );
}

// ── GRÁFICO TEMPORAL ──────────────────────────────────────────────────────────
function buildTempData(lines){
  var ref=lines[0].ser;
  var last=ref.slice(-13);
  var yr=(last[last.length-1]||{p:''}).p.split('/')[1];
  return last.map(function(pt,i){
    var prev=pt.p.split('/')[1]!==yr;
    var first=!prev&&i>0&&last[i-1].p.split('/')[1]!==yr;
    var row={m:pt.p,prev:prev};
    lines.forEach(function(l){
      var sp=l.ser.find(function(x){return x.p===pt.p;});
      var v=sp?sp.v:null;
      row[l.k+'_p']=prev||first?v:null;
      row[l.k+'_c']=!prev?v:null;
    });
    return row;
  });
}
function TempChart(p){
  var lines=p.lines,ht=p.h||220;
  var data=buildTempData(lines);
  var pvF=null,pvL=null;
  data.forEach(function(d){if(d.prev){if(!pvF)pvF=d.m;pvL=d.m;}});
  return h(RCont,{width:'100%',height:ht},
    h(ComposedChart,{data:data,margin:{top:6,right:12,left:-16,bottom:0}},
      h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false}),
      pvF?h(RefArea,{x1:pvF,x2:pvL,fill:'#f0f2f5',fillOpacity:0.85,stroke:'none'}):null,
      pvL?h(RefLine,{x:pvL,stroke:'#9eaab8',strokeDasharray:'4 3',strokeWidth:1}):null,
      h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,interval:0}),
      h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false}),
      h(RCTip,{content:h(TipBase,{})}),
      lines.map(function(l){
        return [
          h(Line,{key:l.k+'_p',type:'monotone',dataKey:l.k+'_p',stroke:l.c,strokeWidth:l.w||1.5,strokeOpacity:0.18,dot:false,connectNulls:true,legendType:'none',name:undefined}),
          h(Line,{key:l.k+'_c',type:'monotone',dataKey:l.k+'_c',stroke:l.c,strokeWidth:l.w||1.5,strokeOpacity:1,name:l.l,dot:{r:l.dot||3,fill:l.c,stroke:'#fff',strokeWidth:1.2},connectNulls:true,legendType:'none',activeDot:{r:5,fill:l.c,stroke:'#fff',strokeWidth:2}})
        ];
      }).reduce(function(a,b){return a.concat(b);})
    )
  );
}

// ── BARRA HORIZONTAL GENÉRICA — altura dinâmica, interval:0 ──────────────────
function HBar(p){
  var data=p.data,yKey=p.yKey||'name',xKey=p.xKey||'v';
  var ht=data.length*36+48;
  return h(RCont,{width:'100%',height:ht},
    h(BarChart,{data:data,layout:'vertical',margin:{top:4,right:58,left:4,bottom:4},barCategoryGap:'22%'},
      h(YAxis,{type:'category',dataKey:yKey,interval:0,tick:{fontSize:10,fill:C.ts,fontFamily:"'IBM Plex Sans',sans-serif"},width:148,axisLine:false,tickLine:false}),
      h(XAxis,{type:'number',tick:{fontSize:8,fill:C.tm},axisLine:false,tickLine:false,tickFormatter:p.fmt||undefined}),
      h(RCTip,{content:h(TipBase,{})}),
      h(Bar,{dataKey:xKey,name:p.barName||xKey,radius:[0,3,3,0],maxBarSize:18,
        label:{position:'right',fontSize:9,fill:C.ts,formatter:p.labelFmt||(function(v){return v.toFixed(1);})}},
        data.map(function(d,i){return h(Cell,{key:i,fill:p.colorFn?p.colorFn(d):C.ti,opacity:p.opFn?p.opFn(d):1});})
      )
    )
  );
}

        h(ComposedChart,{data:CONTAM_MES,margin:{top:20,right:12,left:-16,bottom:0}},
          h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false}),
          h(RefArea,{x1:'jul/25',x2:'dez/25',fill:'#f0f2f5',fillOpacity:0.85,stroke:'none'}),
          h(RefLine,{x:'dez/25',stroke:'#9eaab8',strokeDasharray:'4 3',strokeWidth:1}),
          h(RefLine,{y:3,stroke:C.mr,strokeDasharray:'6 3',strokeWidth:1.2,label:{value:'benchmark <3%',position:'insideTopRight',fontSize:9,fill:C.mr,offset:4}}),
          h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,interval:0}),
          h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,tickFormatter:function(v){return v+'%';},domain:[0,7]}),
          h(RCTip,{formatter:function(v,n,p){var d=p&&p.payload;if(!d)return [v,n];return [v.toFixed(1)+'%  ('+d.nc+' de '+d.pos+' positivas)',n];}}),
          h(Bar,{dataKey:'pct_col',name:'% das coletadas',radius:[3,3,0,0],maxBarSize:32,
            label:{position:'top',fontSize:9,fill:C.ts,formatter:function(v){return v.toFixed(1)+'%';}}},
            CONTAM_MES.map(function(d,i){return h(Cell,{key:i,fill:d.pct_col>3?C.cpe:C.mr,opacity:d.c?1:0.5});})
          )
        )
      ),

    ),
    h(Card,null,
      h(SH,{t:'Swabs de vigilância (UTI A/B + C) — % positividade mensal'}),
      h('div',{style:{fontSize:10,color:C.tm,marginBottom:8}},'Total: '+sTotPos+' positivos / '+sTotCol.toLocaleString('pt-BR')+' coletados = ',h('strong',null,(100*sTotPos/sTotCol).toFixed(1)+'%')),
      h(PctBar,{data:SWAB_MES,color:C.acin,h:195,maxY:12})
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      h(Card,null,
        h(SH,{t:'Contexto — hemoculturas 12,9%'}),
        h('div',{style:{fontSize:11,color:C.ts,lineHeight:1.8}},
          h('p',{style:{marginBottom:6}},'Taxa de 12,9% alinhada com ',h('strong',null,'benchmarks para UTIs'),' (10–20%). Meses >14%: jul, ago, out/25 e jan–mar/26.'),
          h('p',null,'Meses <10% (mar e mai–jun/25) merecem revisão de critério de coleta.')
        )
      ),
      h(Card,null,
        h(SH,{t:'Contexto — swabs de vigilância 5,2%'}),
        h('div',{style:{fontSize:11,color:C.ts,lineHeight:1.8}},
          h('p',{style:{marginBottom:6}},'5,2% coerente com ',h('strong',null,'rastreamento de portadores assintomáticos'),'. Reflete colonização, não infecção.'),
          h('p',null,'Picos mai–jun/25 e set–out/25 coincidem com maior aquisição de MDR (aba Vigilância).')
        )
      )
    )
  );
}
// ── SEÇÃO 7: TEMPO DE POSITIVIDADE ────────────────────────────────────────────
function Tempo(){
  var GRAM_C={neg:C.acin,pos:C.ti,fung:C.mrscn};
  var orgData=TEMPO_ORG.map(function(d){
    return Object.assign({},d,{
      p25_h:d.p25, iqr:d.p75-d.p25
    });
  });
  return h('div',null,
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:10,marginBottom:12}},
      h(Metric,{label:'Hemoculturas c/ dado',value:'660',sub:'jul/25 – mar/26',dark:true}),
      h(Metric,{label:'Mediana global',value:'30,1h',sub:'IQR 18,9 – 43,2h'}),
      h(Metric,{label:'Maioria em 12–36h',value:'59%',sub:'375/660 amostras'}),
      h(Metric,{label:'Detecção >72h',value:'5,5%',sub:'36/660 — atenção fungemia',vc:C.mrscn})
    ),

    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      h(Card,null,
        h(SH,{t:'Distribuição — tempo até positividade (hemoculturas)'}),
        h(RCont,{width:'100%',height:170},
          h(BarChart,{data:TEMPO_DIST,margin:{top:4,right:8,left:-16,bottom:0},barCategoryGap:'18%'},
            h(XAxis,{dataKey:'bin',tick:{fontSize:9,fill:C.ts},axisLine:false,tickLine:false}),
            h(YAxis,{tick:{fontSize:8,fill:C.tm},axisLine:false,tickLine:false}),
            h(RCTip,{formatter:function(v){return [v,'n amostras'];}}),
            h(Bar,{dataKey:'n',radius:[3,3,0,0],maxBarSize:42,
              label:{position:'top',fontSize:9,fill:C.ts}},
              TEMPO_DIST.map(function(d,i){
                return h(Cell,{key:i,fill:i<2?C.esbl:i<4?C.ti:i<6?C.mr:C.mrscn});
              })
            )
          )
        ),
        h(LegRow,{items:[{l:'<24h: BGN rápidos',c:C.esbl},{l:'24–48h: S. aureus / Kleb',c:C.ti},{l:'48–96h: SCN / tardios',c:C.mr},{l:'>96h: Candida/contaminação',c:C.mrscn}]})
      ),
      h(Card,null,
        h(SH,{t:'Mediana mensal — hemoculturas (jul/25–mar/26)'}),
        h(RCont,{width:'100%',height:170},
          h(BarChart,{data:TEMPO_MENSAL,margin:{top:6,right:12,left:-16,bottom:0},barCategoryGap:'22%'},
            h(CartGrid,{strokeDasharray:'2 4',stroke:'#e2e6ea',vertical:false}),
            h(XAxis,{dataKey:'m',tick:{fill:'#6b7280',fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,interval:0}),
            h(YAxis,{tick:{fill:'#6b7280',fontSize:8,fontFamily:"'IBM Plex Mono',monospace"},axisLine:false,tickLine:false,domain:[0,50]}),
            h(RCTip,{formatter:function(v,n,p){var d=p&&p.payload;return [v.toFixed(1)+'h'+(d?' (n='+d.n+')':''),'Mediana'];}}),
            h(Bar,{dataKey:'med',name:'Mediana',radius:[3,3,0,0],maxBarSize:28,
              label:{position:'top',fontSize:9,fill:C.ts,formatter:function(v){return v+'h';}}},
              TEMPO_MENSAL.map(function(d,i){
                return h(Cell,{key:i,fill:d.m.includes('/26')?C.mrsa:C.ti});
              })
            )
          )
        ),
        h('div',{style:{fontSize:10,color:C.tm,marginTop:4}},'Linha tracejada = virada de ano. Dado disponível somente a partir de jul/25.')
      )
    ),
    // Main organism chart — sorted horizontal bars with IQR in tooltip
    h(Card,null,
      h(SH,{t:'Mediana de tempo até positividade por organismo — hemoculturas (IQR no tooltip)'}),
      h(LegRow,{items:[{l:'Gram-negativo',c:C.acin},{l:'Gram-positivo',c:C.ti},{l:'Fungo',c:C.mrscn}]}),
      h(RCont,{width:'100%',height:TEMPO_ORG.length*36+48},
        h(BarChart,{data:orgData,layout:'vertical',margin:{top:4,right:80,left:4,bottom:4},barCategoryGap:'20%'},
          h(YAxis,{type:'category',dataKey:'org',interval:0,tick:{fontSize:10,fill:C.ts,fontFamily:"'IBM Plex Sans',sans-serif"},width:140,axisLine:false,tickLine:false}),
          h(XAxis,{type:'number',tick:{fontSize:8,fill:C.tm},axisLine:false,tickLine:false,domain:[0,60],tickFormatter:function(v){return v+'h';}}),
          h(RCTip,{content:h(TipTempo,{})}),
          h(Bar,{dataKey:'med',name:'Mediana',radius:[0,3,3,0],maxBarSize:16,
            label:{position:'right',fontSize:9,fill:C.ts,formatter:function(v,p){
              var d=p&&p.payload;
              if(!d||d.p25==null) return v.toFixed(1)+'h';
              return v.toFixed(1)+'h  ['+d.p25+'–'+d.p75+']';
            }}},
            orgData.map(function(d,i){return h(Cell,{key:i,fill:GRAM_C[d.gram]||C.ti});})
          )
        )
      ),

    )
  );
}

// ── RAIZ ──────────────────────────────────────────────────────────────────────
var TABS=[
  {k:'geral',l:'Visão Geral'},{k:'setor',l:'MDR por Setor'},
  {k:'staph',l:'Estafilococos'},{k:'vig',l:'Vigilância'},
  {k:'mic',l:'MICs'},{k:'posit',l:'Positividade'},{k:'tempo',l:'Tempo Posit.'}
];
function App(){
  var ts=useState('geral');
  var tab=ts[0],setTab=ts[1];
  return h('div',{style:{minHeight:'100vh'}},
    h('div',{style:{background:'#1a2744',display:'flex',alignItems:'stretch',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(0,0,0,.22)',paddingLeft:16,paddingRight:16,overflowX:'auto'}},
      h('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:700,color:'#9eaab8',letterSpacing:2,display:'flex',alignItems:'center',paddingRight:16,marginRight:4,borderRight:'1px solid rgba(255,255,255,.08)',flexShrink:0}},'CCIH · HUSF'),
      TABS.map(function(t){
        var a=tab===t.k;
        return h('button',{key:t.k,onClick:function(){setTab(t.k);},style:{background:'none',border:'none',color:a?'#fff':'#9eaab8',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,fontWeight:a?600:400,padding:'0 14px',height:46,borderBottom:a?'2px solid #4b9cf5':'2px solid transparent',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}},t.l);
      }),
      h('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',flexShrink:0,fontSize:9,color:'rgba(158,170,184,.5)',fontFamily:"'IBM Plex Mono',monospace",paddingLeft:12}},'jan/25–mar/26')
    ),
    h('div',{style:{padding:'16px 18px',maxWidth:1060,width:'100%',margin:'0 auto'}},
      tab==='geral'?h(VisaoGeral,{}):null,
      tab==='setor'?h(MdrSetor,{}):null,
      tab==='staph'?h(Staph,{}):null,
      tab==='vig'?h(Vigilancia,{}):null,
      tab==='mic'?h(Mics,{}):null,
      tab==='posit'?h(TaxaPosit,{}):null,
      tab==='tempo'?h(Tempo,{}):null
    ),
    h('div',{style:{textAlign:'center',padding:'8px',fontSize:9,color:'#9eaab8',borderTop:'0.5px solid #d0d7de',background:'#fff',marginTop:8}},
h('span',null,'Coleta e tabulação de dados: ',h('strong',null,'Jéssica Mariana Lopes')),
        h('span',{style:{margin:'0 12px',color:'#d0d7de'}},'·'),
        h('span',null,'Análise e desenvolvimento: ',h('strong',null,'Dr. Leandro Mendes')),
        h('span',{style:{margin:'0 12px',color:'#d0d7de'}},'·'),
        h('span',null,'CCIH / HUSF · jan/25–mar/26'))
  );
}
ReactDOM.render(h(App,{}),document.getElementById('root'));
</script>
